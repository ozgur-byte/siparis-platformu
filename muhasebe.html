<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Muhasebe Ekranı</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>

  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: Arial, sans-serif;
      background: #f5f6f8;
      color: #222;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
      background: #fff;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 16px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0;
      font-size: 24px;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    button {
      padding: 10px 14px;
      border: 1px solid #cfd4dc;
      background: #fff;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }

    button:hover {
      background: #f0f3f7;
    }

    .status {
      font-size: 13px;
      color: #666;
      margin-bottom: 12px;
    }

    .table-wrap {
      overflow: auto;
      border: 1px solid #ddd;
      border-radius: 8px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 950px;
    }

    thead th {
      background: #f1f3f6;
      border-bottom: 1px solid #d8dde6;
      border-right: 1px solid #d8dde6;
      padding: 10px;
      text-align: center;
      font-size: 14px;
      white-space: nowrap;
    }

    thead th:first-child {
      text-align: left;
      min-width: 260px;
    }

    tbody td {
      padding: 10px;
      border-bottom: 1px solid #eceff3;
      border-right: 1px solid #eceff3;
      text-align: center;
      font-size: 14px;
    }

    tbody td:first-child {
      text-align: left;
      font-weight: 600;
    }

    tbody tr:hover td {
      background: #fafbfc;
    }

    .total-head,
    .total-cell {
      background: #f7f9fc;
      font-weight: 700;
    }

    .empty {
      text-align: center;
      color: #777;
      padding: 24px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <h1>Muhasebe Ekranı</h1>
      <div class="actions">
        <button id="btnRefresh">Yenile</button>
        <button id="btnExcel">Excel'e Aktar</button>
      </div>
    </div>

    <div class="status" id="statusText">Hazır</div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>ÜRÜN</th>
            <th>ALANYA</th>
            <th>MANAVGAT</th>
            <th>YOL BOYU</th>
            <th>MERKEZ</th>
            <th>GAZİPAŞA</th>
            <th class="total-head">TOPLAM</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr>
            <td colspan="7" class="empty">Veri yükleniyor...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    const WEB_APP_URL = 'https://script.google.com/macros/s/AKfycby0EYkLZmgnnOz-EtKGC2pq5IMnUK4XLq5a6fEVQBblE9hUY6NQBdPDx332hp91vVCHcQ/exec';

    const BRANCHES = [
      { key: 'ALANYA', label: 'ALANYA' },
      { key: 'MANAVGAT', label: 'MANAVGAT' },
      { key: 'YOL_BOYU', label: 'YOL BOYU' },
      { key: 'MERKEZ', label: 'MERKEZ' },
      { key: 'GAZIPASA', label: 'GAZİPAŞA' }
    ];

    let CURRENT_ROWS = [];

    const tableBody = document.getElementById('tableBody');
    const statusText = document.getElementById('statusText');
    const btnRefresh = document.getElementById('btnRefresh');
    const btnExcel = document.getElementById('btnExcel');

    function num(value) {
      if (value === null || value === undefined || value === '') return 0;
      if (typeof value === 'number') return isNaN(value) ? 0 : value;

      const cleaned = String(value)
        .trim()
        .replace(/\./g, '')
        .replace(',', '.')
        .replace(/[^\d.-]/g, '');

      const n = Number(cleaned);
      return isNaN(n) ? 0 : n;
    }

    function fmt(value) {
      return new Intl.NumberFormat('tr-TR', {
        minimumFractionDigits: 0,
        maximumFractionDigits: 2
      }).format(num(value));
    }

    function escapeHtml(value) {
      return String(value ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function totalOfRow(row) {
      return BRANCHES.reduce((sum, branch) => sum + num(row[branch.key]), 0);
    }

    function emptyRow() {
      return {
        urun: '',
        ALANYA: 0,
        MANAVGAT: 0,
        YOL_BOYU: 0,
        MERKEZ: 0,
        GAZIPASA: 0
      };
    }

    function mapPlasiyerToBranch(plasiyer) {
      const p = String(plasiyer || '').trim().toLocaleLowerCase('tr-TR');

      if (!p) return null;
      if (p.includes('çetin orhan manavgat') || p.includes('cetin orhan manavgat') || p.includes('manavgat')) return 'MANAVGAT';
      if (p.includes('gazipaşa') || p.includes('gazipasa')) return 'GAZIPASA';
      if (p.includes('merkez')) return 'MERKEZ';
      if (p.includes('metin ilhan') || p === 'alanya') return 'ALANYA';
      if (p.includes('orhan sezen') || p.includes('yol boyu')) return 'YOL_BOYU';

      return null;
    }

    function normalizeMatrixRow(row) {
      const urun =
        row.urun ??
        row.urunAdi ??
        row.urun_adı ??
        row.product ??
        row.name ??
        row['Ürün'] ??
        row['ÜRÜN'] ??
        '';

      const normalized = emptyRow();
      normalized.urun = String(urun || '').trim();

      normalized.ALANYA = num(row.ALANYA ?? row.Alanya ?? row.alanya);
      normalized.MANAVGAT = num(row.MANAVGAT ?? row.Manavgat ?? row.manavgat);
      normalized.YOL_BOYU = num(
        row.YOL_BOYU ??
        row['YOL BOYU'] ??
        row.yolBoyu ??
        row.yol_boyu ??
        row['yol boyu']
      );
      normalized.MERKEZ = num(row.MERKEZ ?? row.Merkez ?? row.merkez);
      normalized.GAZIPASA = num(
        row.GAZIPASA ??
        row['GAZİPAŞA'] ??
        row['GAZIPASA'] ??
        row.Gazipasa ??
        row.gazipasa ??
        row.gazipaşa
      );

      return normalized;
    }

    function looksLikeMatrixRow(row) {
      if (!row || typeof row !== 'object') return false;

      const hasProduct =
        row.urun !== undefined ||
        row.urunAdi !== undefined ||
        row.product !== undefined ||
        row.name !== undefined ||
        row['Ürün'] !== undefined ||
        row['ÜRÜN'] !== undefined;

      const hasAnyBranch =
        row.ALANYA !== undefined ||
        row.MANAVGAT !== undefined ||
        row.YOL_BOYU !== undefined ||
        row['YOL BOYU'] !== undefined ||
        row.MERKEZ !== undefined ||
        row.GAZIPASA !== undefined ||
        row['GAZİPAŞA'] !== undefined ||
        row['GAZIPASA'] !== undefined;

      return hasProduct && hasAnyBranch;
    }

    function normalizeOrderRecord(item) {
      if (!item || typeof item !== 'object') return null;

      const plasiyer =
        item.plasiyer ??
        item.satici ??
        item.temsilci ??
        item.personel ??
        item.user ??
        item.ad ??
        item.name ??
        '';

      const urun =
        item.urun ??
        item.urunAdi ??
        item.urun_adı ??
        item.product ??
        item.urun_adi ??
        item.stokAdi ??
        item.stok_adi ??
        item.adi ??
        '';

      const koli =
        item.koli ??
        item.miktar ??
        item.adet ??
        item.quantity ??
        item.toplam ??
        item.qty ??
        0;

      const branch = mapPlasiyerToBranch(plasiyer);
      const product = String(urun || '').trim();
      const quantity = num(koli);

      if (!branch || !product) return null;

      return {
        branch,
        urun: product,
        koli: quantity
      };
    }

    function buildMatrixFromOrders(records) {
      const map = new Map();

      for (const raw of records) {
        const record = normalizeOrderRecord(raw);
        if (!record) continue;

        if (!map.has(record.urun)) {
          const row = emptyRow();
          row.urun = record.urun;
          map.set(record.urun, row);
        }

        const row = map.get(record.urun);
        row[record.branch] = num(row[record.branch]) + num(record.koli);
      }

      return Array.from(map.values()).filter(r => r.urun && totalOfRow(r) > 0);
    }

    function candidateArraysFromData(data) {
      const out = [];

      if (Array.isArray(data)) out.push(data);
      if (!data || typeof data !== 'object') return out;

      const keys = [
        'urunBazliSiparisMatrisi',
        'urun_matrisi',
        'productMatrix',
        'matrix',
        'urunler',
        'rows',
        'orders',
        'kayitlar',
        'records',
        'list',
        'data'
      ];

      for (const key of keys) {
        if (Array.isArray(data[key])) out.push(data[key]);
      }

      for (const value of Object.values(data)) {
        if (Array.isArray(value)) {
          out.push(value);
        } else if (value && typeof value === 'object') {
          for (const inner of Object.values(value)) {
            if (Array.isArray(inner)) out.push(inner);
          }
        }
      }

      return out;
    }

    function parseRowsFromPayload(payload) {
      const root = payload && payload.data !== undefined ? payload.data : payload;
      const candidates = candidateArraysFromData(root);

      for (const arr of candidates) {
        if (!Array.isArray(arr) || !arr.length) continue;

        if (arr.some(looksLikeMatrixRow)) {
          const rows = arr.map(normalizeMatrixRow).filter(r => r.urun && totalOfRow(r) > 0);
          if (rows.length) return rows;
        }

        const built = buildMatrixFromOrders(arr);
        if (built.length) return built;
      }

      return [];
    }

    async function fetchJson(url) {
      const res = await fetch(url, {
        method: 'GET',
        cache: 'no-store'
      });

      if (!res.ok) {
        throw new Error('HTTP ' + res.status);
      }

      return res.json();
    }

    async function loadRows() {
      const summaryUrl = `${WEB_APP_URL}?action=summary&_=${Date.now()}`;
      const listUrl = `${WEB_APP_URL}?action=list&_=${Date.now()}`;

      try {
        const summaryPayload = await fetchJson(summaryUrl);
        const rows = parseRowsFromPayload(summaryPayload);
        if (rows.length) return rows;
      } catch (err) {
        console.warn('summary okunamadı', err);
      }

      const listPayload = await fetchJson(listUrl);
      return parseRowsFromPayload(listPayload);
    }

    function renderTable(rows) {
      if (!rows.length) {
        tableBody.innerHTML = `
          <tr>
            <td colspan="7" class="empty">Gösterilecek veri bulunamadı.</td>
          </tr>
        `;
        return;
      }

      tableBody.innerHTML = rows.map(row => `
        <tr>
          <td>${escapeHtml(row.urun)}</td>
          <td>${fmt(row.ALANYA)}</td>
          <td>${fmt(row.MANAVGAT)}</td>
          <td>${fmt(row.YOL_BOYU)}</td>
          <td>${fmt(row.MERKEZ)}</td>
          <td>${fmt(row.GAZIPASA)}</td>
          <td class="total-cell">${fmt(totalOfRow(row))}</td>
        </tr>
      `).join('');
    }

    function exportExcel() {
      if (!CURRENT_ROWS.length) {
        alert('Excel için veri yok.');
        return;
      }

      const excelRows = CURRENT_ROWS.map(row => ({
        'ÜRÜN': row.urun,
        'ALANYA': num(row.ALANYA),
        'MANAVGAT': num(row.MANAVGAT),
        'YOL BOYU': num(row.YOL_BOYU),
        'MERKEZ': num(row.MERKEZ),
        'GAZİPAŞA': num(row.GAZIPASA),
        'TOPLAM': totalOfRow(row)
      }));

      const ws = XLSX.utils.json_to_sheet(excelRows);
      ws['!cols'] = [
        { wch: 40 },
        { wch: 12 },
        { wch: 12 },
        { wch: 12 },
        { wch: 12 },
        { wch: 12 },
        { wch: 12 }
      ];

      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'Muhasebe');
      XLSX.writeFile(wb, 'muhasebe_raporu.xlsx');
    }

    async function refreshData() {
      try {
        statusText.textContent = 'Veriler yükleniyor...';
        tableBody.innerHTML = `
          <tr>
            <td colspan="7" class="empty">Veri yükleniyor...</td>
          </tr>
        `;

        const rows = await loadRows();
        CURRENT_ROWS = rows.sort((a, b) => a.urun.localeCompare(b.urun, 'tr'));

        renderTable(CURRENT_ROWS);
        statusText.textContent = `Hazır • ${CURRENT_ROWS.length} ürün satırı`;
      } catch (error) {
        console.error(error);
        CURRENT_ROWS = [];
        tableBody.innerHTML = `
          <tr>
            <td colspan="7" class="empty">Veri alınamadı: ${escapeHtml(error.message)}</td>
          </tr>
        `;
        statusText.textContent = 'Hata oluştu';
      }
    }

    btnRefresh.addEventListener('click', refreshData);
    btnExcel.addEventListener('click', exportExcel);

    refreshData();
  </script>
</body>
</html>
