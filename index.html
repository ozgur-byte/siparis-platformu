<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sipariş Toplama Platformu</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #dbe3ea;
      --soft: #eef6f5;
      --danger: #b91c1c;
      --warning: #92400e;
      --warning-bg: #fff7ed;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      max-width: 860px;
      margin: 0 auto;
      padding: 12px;
    }

    .header, .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.04);
    }

    .header {
      padding: 18px;
      margin-bottom: 14px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .brand img {
      height: 44px;
      width: auto;
      object-fit: contain;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.2;
    }

    .rep-badge {
      display: inline-block;
      padding: 10px 14px;
      border-radius: 999px;
      background: #eef6f5;
      color: #115e59;
      font-weight: 700;
      font-size: 14px;
      margin-top: 8px;
      border: 2px solid #cde7e4;
    }

    .top-actions {
      margin-top: 12px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .card {
      padding: 18px;
    }

    .title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 16px;
    }

    .field {
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    select,
    input[type="date"],
    input[type="number"] {
      width: 100%;
      border: 2px solid #cfd8e3;
      border-radius: 18px;
      background: #f8fafc;
      padding: 14px 16px;
      font-size: 18px;
      min-height: 56px;
      outline: none;
      box-shadow: inset 0 1px 2px rgba(15, 23, 42, 0.05);
    }

    select:focus,
    input[type="date"]:focus,
    input[type="number"]:focus {
      border-color: #94a3b8;
      background: #ffffff;
    }

    input[type="number"] {
      text-align: right;
      font-weight: 700;
      font-size: 24px;
    }

    .products {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 55vh;
      overflow: auto;
      padding-right: 4px;
    }

    .product-row {
      display: grid;
      grid-template-columns: 1fr 120px;
      gap: 10px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: #fff;
      padding: 14px;
    }

    .product-name {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.25;
      margin-bottom: 5px;
    }

    .product-code {
      font-size: 14px;
      color: var(--muted);
    }

    .btn {
      width: 100%;
      min-height: 58px;
      border-radius: 18px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      padding: 12px 14px;
      color: #fff;
      border: 3px solid transparent;
      transition: 0.15s ease;
    }

    .btn:hover {
      filter: brightness(0.96);
    }

    .btn:active {
      transform: translateY(1px);
    }

    .btn-submit {
      background: #0f766e;
      border-color: #115e59;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.12);
    }

    .btn-orders {
      background: #1d4ed8;
      border-color: #1e40af;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.12);
    }

    .btn-edit {
      background: #d97706;
      border-color: #b45309;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.12);
    }

    .btn-cancel {
      background: #b91c1c;
      border-color: #991b1b;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.12);
    }

    .btn-change {
      background: #475569;
      border-color: #334155;
      color: #fff;
      min-height: 46px;
      max-width: 220px;
      font-size: 15px;
    }

    .btn-secondary {
      background: #64748b;
      border-color: #475569;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.12);
    }

    .btn-active {
      outline: 3px solid rgba(15, 23, 42, 0.12);
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    .message {
      margin-top: 14px;
      background: #eef6f5;
      border-radius: 18px;
      padding: 14px;
      font-size: 15px;
      line-height: 1.5;
      border: 1px solid #d8ebe8;
    }

    .message.warning {
      background: var(--warning-bg);
      color: var(--warning);
      font-weight: 700;
      border: 1px solid #fed7aa;
    }

    .message.success {
      background: #ecfdf5;
      color: #065f46;
      font-weight: 700;
      border: 1px solid #bbf7d0;
    }

    .section {
      margin-top: 14px;
    }

    .orders-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .order-card {
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 14px;
      background: #fff;
    }

    .order-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 10px;
    }

    .order-title {
      font-size: 17px;
      font-weight: 700;
    }

    .order-sub {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
    }

    .order-total {
      font-size: 18px;
      font-weight: 800;
      white-space: nowrap;
    }

    .order-items {
      margin: 0;
      padding-left: 18px;
      color: var(--text);
      font-size: 14px;
      line-height: 1.55;
    }

    .order-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 12px;
    }

    .mini-btn {
      border: none;
      cursor: pointer;
      min-height: 38px;
      padding: 8px 14px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 800;
      color: #fff;
    }

    .mini-edit {
      background: #d97706;
    }

    .mini-cancel {
      background: #b91c1c;
    }

    .mode-badge {
      display: inline-block;
      margin-top: 10px;
      padding: 9px 12px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 800;
      border: 1px solid transparent;
    }

    .mode-normal {
      background: #eef6f5;
      color: #115e59;
      border-color: #cde7e4;
    }

    .mode-edit {
      background: #fff7ed;
      color: #9a3412;
      border-color: #fed7aa;
    }

    .mode-cancel {
      background: #fef2f2;
      color: #991b1b;
      border-color: #fecaca;
    }

    .screen {
      display: none;
    }

    .screen.active {
      display: block;
    }

    .hidden {
      display: none;
    }

    @media (max-width: 560px) {
      .container {
        padding: 10px;
      }

      .card, .header {
        border-radius: 18px;
      }

      .product-row {
        grid-template-columns: 1fr 110px;
        padding: 12px;
      }

      .product-name {
        font-size: 16px;
      }

      input[type="number"] {
        font-size: 22px;
      }

      .brand img {
        height: 38px;
      }

      h1 {
        font-size: 24px;
      }

      .order-head {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="loginScreen" class="screen active">
      <div class="header">
        <div class="brand">
          <img src="logo.png" alt="AL-TAV Logo" onerror="this.style.display='none'" />
          <h1>Sipariş Giriş Ekranı - Özgür</h1>
        </div>
      </div>

      <div class="card">
        <div class="title">Plasiyer Seçimi</div>
        <div class="field">
          <label for="repLoginSelect">Plasiyer Adı</label>
          <select id="repLoginSelect">
            <option value="">Plasiyer seçin</option>
          </select>
        </div>
        <button class="btn btn-submit" id="enterSystemBtn">Devam Et</button>
      </div>
    </div>

    <div id="appScreen" class="screen">
      <div class="header">
        <div class="brand">
          <img src="logo.png" alt="AL-TAV Logo" onerror="this.style.display='none'" />
          <h1>Sipariş Giriş Ekranı - Özgür</h1>
        </div>
        <div class="rep-badge" id="activeRepBadge"></div>
        <div id="modeBadge" class="mode-badge mode-normal">Mod: Yeni sipariş</div>
        <div class="top-actions">
          <button class="btn btn-change" id="changeRepBtn">Başka plasiyer seç</button>
        </div>
      </div>

      <div class="card">
        <div class="title">Plasiyer Sipariş Girişi</div>

        <div class="field">
          <label for="dateInput">Tarih</label>
          <input id="dateInput" type="date" />
        </div>

        <div class="products" id="products"></div>

        <div style="margin-top: 14px; display:grid; gap:10px;">
          <button class="btn btn-submit" id="submitBtn">Gönder</button>
          <button class="btn btn-secondary hidden" id="resetModeBtn">Yeni Sipariş Moduna Dön</button>
        </div>

        <div class="actions">
          <button class="btn btn-orders" id="myOrdersBtn">Siparişlerim</button>
          <button class="btn btn-edit" id="editModeBtn" type="button">Siparişime ekleme/çıkarma yapmak istiyorum</button>
          <button class="btn btn-cancel" id="cancelModeBtn" type="button">Siparişimi tamamen iptal etmek istiyorum</button>
        </div>

        <div class="message hidden" id="messageBox"></div>

        <div class="section hidden" id="myOrdersSection">
          <div class="title" style="font-size:20px; margin-top: 6px;">Siparişlerim</div>
          <div class="orders-list" id="ordersList"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyzKq7cejCei26si70SuLBtYTvcRIxr25geu6H2CQmIm0Jtn1EnhxaB4CHmdFOZElgqsA/exec";

    const PRODUCTS = [
      { id: '19179-1', code: '19179', name: 'DÖKME AÇIK' },
      { id: '19173-1', code: '19173', name: 'POŞETLİ' },
      { id: '33787-1', code: '33787', name: 'MAKSİ' },
      { id: '25338-1', code: '25338', name: 'POŞETLİ 14' },
      { id: '19354-1', code: '19354', name: 'DÖKME BAGET' },
      { id: '19352-1', code: '19352', name: 'DÖKME KALÇALI BUT' },
      { id: '19355-1', code: '19355', name: 'DÖKME BUT İNCİK' },
      { id: '4924-1', code: '4924', name: 'DÖKME KEMİKSİZ BUT' },
      { id: '33836-1', code: '33836', name: 'DÖKME DERİLİ LOKUMSUZ BONFİLE' },
      { id: '19362-1', code: '19362', name: 'DÖKME BONFİLE' },
      { id: '19360-1', code: '19360', name: 'DÖKME KOVAN GÖĞÜS' },
      { id: '19361-1', code: '19361', name: 'DÖKME MUZ GÖĞÜS' },
      { id: '19367-1', code: '19367', name: 'DÖKME ÇORBALIK' },
      { id: '19351-1', code: '19351', name: 'DÖKME IZGARALIK KANAT' },
      { id: '19349-1', code: '19349', name: 'DÖKME SPESİYAL KANAT' },
      { id: '19348-1', code: '19348', name: 'DÖKME UCLU KANAT' },
      { id: '19101-1', code: '19101', name: 'TABAKLI KALÇALI BUT' },
      { id: '19103-1', code: '19103', name: 'TABAKLI BAGET' },
      { id: '19130-1', code: '19130', name: 'TABAKLI BUT İNCİK' },
      { id: '19105-1', code: '19105', name: 'TABAKLI IZGARA TAVA' },
      { id: '36137-1', code: '36137', name: 'TABAKLI SPS KANAT' },
      { id: '33798-1', code: '33798', name: 'TABAKLI JUMBO KANAT' },
      { id: '36138-1', code: '36138', name: 'TABAKLI IZGARA KANAT' },
      { id: '19110-1', code: '19110', name: 'TABAKLI BONFİLE' },
      { id: '25339-1', code: '25339', name: 'TABAKLI CİĞER' },
      { id: '19320-1', code: '19320', name: 'TABAKLI TAŞLIK' },
      { id: '31343-1', code: '31343', name: 'TABAKLI YÜREK' },
      { id: '2812318-1', code: '2812318', name: 'AL-TAV UÇLU KANAT' },
      { id: '2812302-1', code: '2812302', name: 'AL-TAV BONFİLE' },
      { id: '2812313-1', code: '2812313', name: 'AL-TAV KEMİKSİZ BUT' },
      { id: '2812305-1', code: '2812305', name: 'AL-TAV ÇORBALIK' },
      { id: '2812310-1', code: '2812310', name: 'AL-TAV KALÇALI BUT' },
      { id: '2812303-1', code: '2812303', name: 'AL-TAV BUT İNCİK' },
      { id: '2812306-1', code: '2812306', name: 'AL-TAV DÖNERLİK BONFİLE' },
      { id: '19027-1', code: '19027', name: 'ŞENPİLİÇ ÇATAL BUT' }
    ];

    const HIGH_LIMIT_EXCLUDED_CODES = ['19179', '19173'];
    const PLASIYERS = ['Metin İlhan', 'Çetin Orhan Manavgat', 'Orhan Sezen', 'Merkez', 'Gazipaşa'];

    const loginScreen = document.getElementById('loginScreen');
    const appScreen = document.getElementById('appScreen');
    const repLoginSelect = document.getElementById('repLoginSelect');
    const enterSystemBtn = document.getElementById('enterSystemBtn');
    const activeRepBadge = document.getElementById('activeRepBadge');
    const modeBadge = document.getElementById('modeBadge');
    const changeRepBtn = document.getElementById('changeRepBtn');
    const dateInput = document.getElementById('dateInput');
    const productsWrap = document.getElementById('products');
    const submitBtn = document.getElementById('submitBtn');
    const resetModeBtn = document.getElementById('resetModeBtn');
    const myOrdersBtn = document.getElementById('myOrdersBtn');
    const editModeBtn = document.getElementById('editModeBtn');
    const cancelModeBtn = document.getElementById('cancelModeBtn');
    const messageBox = document.getElementById('messageBox');
    const myOrdersSection = document.getElementById('myOrdersSection');
    const ordersList = document.getElementById('ordersList');

    let orders = [];
    let activeRep = '';
    let showOrders = false;
    let mode = 'create';
    let editingOrderId = null;

    function todayDefault() {
      const now = new Date();
      const y = now.getFullYear();
      const m = String(now.getMonth() + 1).padStart(2, '0');
      const d = String(now.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    function parseTrDateTime(value) {
      if (!value) return 0;
      const [datePart, timePart = '00:00'] = String(value).split(' ');
      if (!datePart) return 0;

      if (datePart.includes('-')) {
        return new Date(`${datePart}T${timePart}`).getTime() || 0;
      }

      const parts = datePart.split('.');
      if (parts.length !== 3) return 0;

      const [dd, mm, yyyy] = parts;
      return new Date(`${yyyy}-${mm}-${dd}T${timePart}`).getTime() || 0;
    }

    function displayOrderDate(order) {
      return order.date || '-';
    }

    function extractIsoDate(value) {
      if (!value) return todayDefault();
      const dateOnly = String(value).split(' ')[0];

      if (dateOnly.includes('-')) {
        return dateOnly.slice(0, 10);
      }

      const parts = dateOnly.split('.');
      if (parts.length !== 3) return todayDefault();

      const [dd, mm, yyyy] = parts;
      return `${yyyy}-${mm.padStart(2, '0')}-${dd.padStart(2, '0')}`;
    }

    function showMessage(text, type = 'normal') {
      messageBox.classList.remove('hidden', 'warning', 'success');
      if (type === 'warning') messageBox.classList.add('warning');
      if (type === 'success') messageBox.classList.add('success');
      messageBox.textContent = text;
    }

    function clearMessage() {
      messageBox.classList.add('hidden');
      messageBox.classList.remove('warning', 'success');
      messageBox.textContent = '';
    }

    function renderPlasiyers() {
      repLoginSelect.innerHTML =
        '<option value="">Plasiyer seçin</option>' +
        PLASIYERS.map(name => `<option value="${name}">${name}</option>`).join('');
      repLoginSelect.value = '';
    }

    function renderProducts() {
      productsWrap.innerHTML = PRODUCTS.map(product => `
        <div class="product-row">
          <div>
            <div class="product-name">${product.name}</div>
            <div class="product-code">Kod: ${product.code}</div>
          </div>
          <input type="number" min="0" inputmode="numeric" data-id="${product.id}" />
        </div>
      `).join('');
    }

    function getInputs() {
      return productsWrap.querySelectorAll('input[data-id]');
    }

    function collectOrder() {
      const inputs = getInputs();
      const cleanItems = {};
      let total = 0;

      inputs.forEach(input => {
        const val = Number(input.value || 0);
        if (val > 0) {
          cleanItems[input.dataset.id] = val;
          total += val;
        }
      });

      return { cleanItems, total };
    }

    function clearInputs() {
      getInputs().forEach(input => {
        input.value = '';
      });
    }

    function fillInputsFromItems(items) {
      clearInputs();

      items.forEach(item => {
        const product = PRODUCTS.find(p => p.name === item.urun);
        if (!product) return;

        const input = productsWrap.querySelector(`input[data-id="${product.id}"]`);
        if (input) {
          input.value = Number(item.miktar || 0);
        }
      });
    }

    function getProductById(id) {
      return PRODUCTS.find(p => p.id === id);
    }

    function convertItemsForSheet(items) {
      return Object.entries(items)
        .filter(([, qty]) => Number(qty) > 0)
        .map(([id, qty]) => {
          const product = getProductById(id);
          return {
            urun: product ? product.name : id,
            miktar: Number(qty)
          };
        });
    }

    function formatOrderItems(items) {
      return items
        .filter(item => Number(item.miktar) > 0)
        .map(item => `${item.urun}: ${item.miktar} koli`);
    }

    function groupOrdersByKayitNo(list) {
      const map = new Map();

      list.forEach(row => {
        if (!row.kayitNo) return;

        if (!map.has(row.kayitNo)) {
          map.set(row.kayitNo, {
            kayitNo: row.kayitNo,
            rep: row.plasiyer,
            date: row.tarihSaat || '',
            aciklama: row.aciklama || '',
            durum: row.durum || 'AKTIF',
            items: []
          });
        }

        map.get(row.kayitNo).items.push({
          urun: row.urun,
          miktar: Number(row.miktar || 0)
        });
      });

      return Array.from(map.values()).sort((a, b) => parseTrDateTime(b.date) - parseTrDateTime(a.date));
    }

    async function fetchOrdersFromSheet(includeCancelled = false) {
      const res = await fetch(`${APPS_SCRIPT_URL}?action=list&includeCancelled=${includeCancelled ? 'true' : 'false'}`);
      const data = await res.json();

      if (!data.ok) {
        throw new Error(data.error || 'Siparişler alınamadı');
      }

      orders = groupOrdersByKayitNo(data.data || []);
      return orders;
    }

    async function refreshOrdersList() {
      try {
        await fetchOrdersFromSheet(false);
        renderOrdersList();
      } catch (err) {
        showMessage('Sipariş listesi alınamadı: ' + err.message, 'warning');
      }
    }

    function getActiveRepOrders() {
      return orders.filter(order => order.rep === activeRep);
    }

    function renderOrdersList() {
      if (!showOrders) {
        myOrdersSection.classList.add('hidden');
        return;
      }

      myOrdersSection.classList.remove('hidden');

      const repOrders = getActiveRepOrders();

      if (!repOrders.length) {
        ordersList.innerHTML = '<div class="order-card">Bu plasiyer için kayıtlı sipariş görünmüyor.</div>';
        return;
      }

      ordersList.innerHTML = repOrders.map(order => {
        const lines = formatOrderItems(order.items);
        const total = order.items.reduce((sum, item) => sum + Number(item.miktar || 0), 0);

        return `
          <div class="order-card">
            <div class="order-head">
              <div>
                <div class="order-title">${order.rep}</div>
                <div class="order-sub">Tarih/Saat: ${displayOrderDate(order)}</div>
                <div class="order-sub">Kayıt No: ${order.kayitNo}</div>
              </div>
              <div class="order-total">${total} koli</div>
            </div>
            <ul class="order-items">
              ${lines.map(line => `<li>${line}</li>`).join('')}
            </ul>
            ${(mode === 'edit' || mode === 'cancel') ? `
              <div class="order-actions">
                ${mode === 'edit' ? `<button class="mini-btn mini-edit" onclick="startEditOrder('${order.kayitNo}')">Bu siparişi düzenle</button>` : ''}
                ${mode === 'cancel' ? `<button class="mini-btn mini-cancel" onclick="cancelOrderById('${order.kayitNo}')">Bu siparişi iptal et</button>` : ''}
              </div>
            ` : ''}
          </div>
        `;
      }).join('');
    }

    function checkHighQuantityWarnings(cleanItems) {
      const warnings = Object.entries(cleanItems)
        .map(([id, qty]) => {
          const product = getProductById(id);
          if (!product) return null;
          if (HIGH_LIMIT_EXCLUDED_CODES.includes(product.code)) return null;
          if (Number(qty) > 50) {
            return `${product.name} ürünündeki sipariş ${qty} koli. Bu miktar ortalamanın üzerinde.`;
          }
          return null;
        })
        .filter(Boolean);

      if (!warnings.length) return true;

      return window.confirm(`${warnings.join('\n')}\n\nEmin misin?`);
    }

    async function sendOrderRequest(payload) {
      const res = await fetch(APPS_SCRIPT_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'text/plain;charset=utf-8'
        },
        body: JSON.stringify(payload)
      });

      const data = await res.json();

      if (!data.ok) {
        throw new Error(data.error || 'İşlem yapılamadı');
      }

      return data;
    }

    function setActiveRepUI() {
      activeRepBadge.textContent = `Giriş yapan plasiyer: ${activeRep}`;
    }

    function updateModeUI() {
      submitBtn.textContent = editingOrderId ? 'Siparişi Güncelle' : 'Gönder';
      resetModeBtn.classList.toggle('hidden', !editingOrderId && mode === 'create');

      editModeBtn.classList.toggle('btn-active', mode === 'edit');
      cancelModeBtn.classList.toggle('btn-active', mode === 'cancel');

      modeBadge.className = 'mode-badge';

      if (editingOrderId) {
        modeBadge.classList.add('mode-edit');
        modeBadge.textContent = `Mod: Düzenleme (${editingOrderId})`;
        return;
      }

      if (mode === 'edit') {
        modeBadge.classList.add('mode-edit');
        modeBadge.textContent = 'Mod: Düzenlemek için sipariş seç';
        return;
      }

      if (mode === 'cancel') {
        modeBadge.classList.add('mode-cancel');
        modeBadge.textContent = 'Mod: İptal etmek için sipariş seç';
        return;
      }

      modeBadge.classList.add('mode-normal');
      modeBadge.textContent = 'Mod: Yeni sipariş';
    }

    function resetToCreateMode() {
      mode = 'create';
      editingOrderId = null;
      clearInputs();
      dateInput.value = todayDefault();
      updateModeUI();
      renderOrdersList();
    }

    async function switchToApp() {
      if (!activeRep) return;
      setActiveRepUI();
      loginScreen.classList.remove('active');
      appScreen.classList.add('active');
      clearMessage();
      resetToCreateMode();
      if (showOrders) {
        await refreshOrdersList();
      }
    }

    function switchToLogin() {
      appScreen.classList.remove('active');
      loginScreen.classList.add('active');
      activeRep = '';
      repLoginSelect.value = '';
      clearInputs();
      clearMessage();
      showOrders = false;
      myOrdersSection.classList.add('hidden');
      ordersList.innerHTML = '';
      resetToCreateMode();
    }

    async function submitOrder() {
      const date = dateInput.value;
      const { cleanItems, total } = collectOrder();

      if (!Object.keys(cleanItems).length) {
        showMessage('En az bir ürün için koli miktarı girmen gerekiyor.', 'warning');
        return;
      }

      const highQtyConfirmed = checkHighQuantityWarnings(cleanItems);
      if (!highQtyConfirmed) {
        showMessage('Yüksek koli uyarısı nedeniyle işlem iptal edildi.', 'warning');
        return;
      }

      const actionText = editingOrderId ? 'Bu sipariş güncellenecek.' : 'Yeni sipariş gönderilecek.';
      const confirmed = window.confirm(`${actionText}\nToplam sipariş koli miktarı: ${total} koli.\nOnaylıyor musun?`);
      if (!confirmed) {
        showMessage('İşlem iptal edildi.', 'warning');
        return;
      }

      const payload = {
        action: editingOrderId ? 'updateOrder' : 'create',
        kayitNo: editingOrderId || undefined,
        plasiyer: activeRep,
        aciklama: date,
        cihaz: navigator.userAgent,
        testMi: false,
        urunler: convertItemsForSheet(cleanItems)
      };

      submitBtn.disabled = true;
      submitBtn.textContent = editingOrderId ? 'Güncelleniyor...' : 'Gönderiliyor...';

      try {
        await sendOrderRequest(payload);
        showMessage(editingOrderId ? 'Sipariş güncellendi.' : 'Sipariş kaydedildi.', 'success');
        resetToCreateMode();
        if (showOrders) {
          await refreshOrdersList();
        }
      } catch (err) {
        showMessage('İşlem hatası: ' + err.message, 'warning');
      } finally {
        submitBtn.disabled = false;
        updateModeUI();
      }
    }

    window.startEditOrder = async function(kayitNo) {
      try {
        await fetchOrdersFromSheet(false);
        const order = orders.find(x => x.kayitNo === kayitNo && x.rep === activeRep);

        if (!order) {
          showMessage('Düzenlenecek sipariş bulunamadı.', 'warning');
          return;
        }

        editingOrderId = kayitNo;
        mode = 'edit';
        dateInput.value = extractIsoDate(order.aciklama || order.date);
        fillInputsFromItems(order.items);
        updateModeUI();
        showMessage('Sipariş düzenleme modunda. Miktarları değiştirip "Siparişi Güncelle" butonuna bas.', 'success');
        window.scrollTo({ top: 0, behavior: 'smooth' });
      } catch (err) {
        showMessage('Sipariş düzenleme hatası: ' + err.message, 'warning');
      }
    };

    window.cancelOrderById = async function(kayitNo) {
      const confirmed = window.confirm('Bu sipariş tamamen iptal edilecek. Emin misin?');
      if (!confirmed) return;

      try {
        await sendOrderRequest({
          action: 'cancelOrder',
          kayitNo
        });

        showMessage('Sipariş tamamen iptal edildi.', 'success');

        if (editingOrderId === kayitNo) {
          resetToCreateMode();
        }

        if (showOrders) {
          await refreshOrdersList();
        }
      } catch (err) {
        showMessage('İptal hatası: ' + err.message, 'warning');
      }
    };

    enterSystemBtn.addEventListener('click', async () => {
      if (!repLoginSelect.value) {
        alert('Lütfen plasiyer seçin.');
        return;
      }

      activeRep = repLoginSelect.value;
      await switchToApp();
    });

    changeRepBtn.addEventListener('click', () => {
      const confirmed = window.confirm('Başka bir plasiyer seçmek istiyor musun?');
      if (!confirmed) return;
      switchToLogin();
    });

    submitBtn.addEventListener('click', submitOrder);

    resetModeBtn.addEventListener('click', () => {
      resetToCreateMode();
      showMessage('Yeni sipariş moduna dönüldü.', 'success');
    });

    myOrdersBtn.addEventListener('click', async () => {
      showOrders = !showOrders;
      clearMessage();

      if (showOrders) {
        await refreshOrdersList();
      } else {
        renderOrdersList();
      }
    });

    editModeBtn.addEventListener('click', async () => {
      mode = mode === 'edit' && !editingOrderId ? 'create' : 'edit';
      if (mode === 'edit') {
        showOrders = true;
        await refreshOrdersList();
        showMessage('Düzenlemek istediğin siparişte "Bu siparişi düzenle" butonuna bas.', 'success');
      } else {
        resetToCreateMode();
        showMessage('Yeni sipariş moduna dönüldü.', 'success');
      }
      updateModeUI();
    });

    cancelModeBtn.addEventListener('click', async () => {
      if (editingOrderId) {
        resetToCreateMode();
      }

      mode = mode === 'cancel' ? 'create' : 'cancel';
      if (mode === 'cancel') {
        showOrders = true;
        await refreshOrdersList();
        showMessage('İptal etmek istediğin siparişte "Bu siparişi iptal et" butonuna bas.', 'warning');
      } else {
        showMessage('Yeni sipariş moduna dönüldü.', 'success');
      }
      updateModeUI();
    });

    renderPlasiyers();
    renderProducts();
    dateInput.value = todayDefault();
    updateModeUI();
  </script>
</body>
</html>
