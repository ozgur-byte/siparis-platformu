<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sipariş Toplama Platformu</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #dbe3ea;
      --primary: #0f766e;
      --primary-dark: #115e59;
      --soft: #eef6f5;
      --danger: #b91c1c;
      --warning: #92400e;
      --warning-bg: #fff7ed;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      max-width: 820px;
      margin: 0 auto;
      padding: 12px;
    }

    .header, .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 24px;
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.04);
    }

    .header {
      padding: 18px;
      margin-bottom: 14px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .brand img {
      height: 44px;
      width: auto;
      object-fit: contain;
    }

    h1 {
      margin: 0;
      font-size: 28px;
      line-height: 1.2;
    }

    .rep-badge {
      display: inline-block;
      padding: 10px 14px;
      border-radius: 999px;
      background: var(--soft);
      color: var(--primary-dark);
      font-weight: 700;
      font-size: 14px;
      margin-top: 8px;
    }

    .top-actions {
      margin-top: 12px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .card {
      padding: 18px;
    }

    .title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 16px;
    }

    .field {
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    select, input[type="date"], input[type="number"] {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: #fff;
      padding: 14px 16px;
      font-size: 18px;
      min-height: 56px;
      outline: none;
    }

    input[type="number"] {
      text-align: right;
      font-weight: 700;
      font-size: 24px;
    }

    .products {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 55vh;
      overflow: auto;
      padding-right: 4px;
    }

    .product-row {
      display: grid;
      grid-template-columns: 1fr 120px;
      gap: 10px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: #fff;
      padding: 14px;
    }

    .product-name {
      font-size: 18px;
      font-weight: 700;
      line-height: 1.25;
      margin-bottom: 5px;
    }

    .product-code {
      font-size: 14px;
      color: var(--muted);
    }

    .btn {
      border: 0;
      background: var(--primary);
      color: #fff;
      width: 100%;
      min-height: 58px;
      border-radius: 18px;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      padding: 12px 14px;
    }

    .btn:hover { background: var(--primary-dark); }

    .btn.secondary {
      background: #1f2937;
      min-height: 52px;
      font-size: 16px;
    }

    .btn.light {
      background: #e5e7eb;
      color: #111827;
    }

    .btn.danger {
      background: var(--danger);
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      margin-top: 14px;
    }

    .message {
      margin-top: 14px;
      background: var(--soft);
      border-radius: 18px;
      padding: 14px;
      font-size: 15px;
      line-height: 1.5;
    }

    .message.warning {
      background: var(--warning-bg);
      color: var(--warning);
      font-weight: 700;
    }

    .section {
      margin-top: 14px;
    }

    .orders-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .order-card {
      border: 1px solid var(--line);
      border-radius: 20px;
      padding: 14px;
      background: #fff;
    }

    .order-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: flex-start;
      margin-bottom: 10px;
    }

    .order-title {
      font-size: 17px;
      font-weight: 700;
    }

    .order-sub {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
    }

    .order-total {
      font-size: 18px;
      font-weight: 800;
      white-space: nowrap;
    }

    .order-items {
      margin: 0;
      padding-left: 18px;
      color: var(--text);
      font-size: 14px;
      line-height: 1.55;
    }

    .order-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 12px;
    }

    .screen {
      display: none;
    }

    .screen.active {
      display: block;
    }

    .hidden { display: none; }

    @media (max-width: 560px) {
      .container {
        padding: 10px;
      }
      .card, .header {
        border-radius: 18px;
      }
      .product-row {
        grid-template-columns: 1fr 110px;
        padding: 12px;
      }
      .product-name {
        font-size: 16px;
      }
      input[type="number"] {
        font-size: 22px;
      }
      .order-actions {
        grid-template-columns: 1fr;
      }
      .brand img {
        height: 38px;
      }
      h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="loginScreen" class="screen active">
      <div class="header">
        <div class="brand">
          <img src="logo.png" alt="AL-TAV Logo" onerror="this.style.display='none'" />
          <h1>Sipariş Giriş Ekranı - Özgür</h1>
        </div>
      </div>

      <div class="card">
        <div class="title">Plasiyer Seçimi</div>
        <div class="field">
          <label for="repLoginSelect">Plasiyer Adı</label>
          <select id="repLoginSelect"></select>
        </div>
        <button class="btn" id="enterSystemBtn">Devam Et</button>
      </div>
    </div>

    <div id="appScreen" class="screen">
      <div class="header">
        <div class="brand">
          <img src="logo.png" alt="AL-TAV Logo" onerror="this.style.display='none'" />
          <h1>Sipariş Giriş Ekranı - Özgür</h1>
        </div>
        <div class="rep-badge" id="activeRepBadge"></div>
        <div class="top-actions">
          <button class="btn light" id="changeRepBtn" style="max-width:220px; min-height:46px;">Başka plasiyer seç</button>
        </div>
      </div>

      <div class="card">
        <div class="title">Plasiyer Sipariş Girişi</div>

        <div class="field">
          <label for="dateInput">Tarih</label>
          <input id="dateInput" type="date" />
        </div>

        <div class="products" id="products"></div>

        <div style="margin-top: 14px;">
          <button class="btn" id="submitBtn">Gönder</button>
        </div>

        <div class="actions">
          <button class="btn secondary" id="myOrdersBtn">Siparişlerim</button>
          <button class="btn light" id="editModeBtn">Siparişime eklemek/çıkarma yapmak istiyorum</button>
          <button class="btn danger" id="cancelModeBtn">Siparişimi iptal etmek istiyorum</button>
        </div>

        <div class="message hidden" id="messageBox"></div>

        <div class="section hidden" id="myOrdersSection">
          <div class="title" style="font-size:20px; margin-top: 6px;">Siparişlerim</div>
          <div class="orders-list" id="ordersList"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const PRODUCTS = [
      { id: '19179-1', code: '19179', name: 'DÖKME AÇIK' },
      { id: '19173-1', code: '19173', name: 'POŞETLİ' },
      { id: '33787-1', code: '33787', name: 'MAKSİ' },
      { id: '25338-1', code: '25338', name: 'POŞETLİ 14' },
      { id: '19354-1', code: '19354', name: 'DÖKME BAGET' },
      { id: '19352-1', code: '19352', name: 'DÖKME KALÇALI BUT' },
      { id: '19355-1', code: '19355', name: 'DÖKME BUT İNCİK' },
      { id: '4924-1', code: '4924', name: 'DÖKME KEMİKSİZ BUT' },
      { id: '33836-1', code: '33836', name: 'DÖKME DERİLİ LOKUMSUZ BONFİLE' },
      { id: '19362-1', code: '19362', name: 'DÖKME BONFİLE' },
      { id: '19360-1', code: '19360', name: 'DÖKME KOVAN GÖĞÜS' },
      { id: '19361-1', code: '19361', name: 'DÖKME MUZ GÖĞÜS' },
      { id: '19367-1', code: '19367', name: 'DÖKME ÇORBALIK' },
      { id: '19351-1', code: '19351', name: 'DÖKME IZGARALIK KANAT' },
      { id: '19349-1', code: '19349', name: 'DÖKME SPESİYAL KANAT' },
      { id: '19348-1', code: '19348', name: 'DÖKME UCLU KANAT' },
      { id: '19101-1', code: '19101', name: 'TABAKLI KALÇALI BUT' },
      { id: '19103-1', code: '19103', name: 'TABAKLI BAGET' },
      { id: '19130-1', code: '19130', name: 'TABAKLI BUT İNCİK' },
      { id: '19105-1', code: '19105', name: 'TABAKLI IZGARA TAVA' },
      { id: '36137-1', code: '36137', name: 'TABAKLI SPS KANAT' },
      { id: '33798-1', code: '33798', name: 'TABAKLI JUMBO KANAT' },
      { id: '36138-1', code: '36138', name: 'TABAKLI IZGARA KANAT' },
      { id: '19110-1', code: '19110', name: 'TABAKLI BONFİLE' },
      { id: '25339-1', code: '25339', name: 'TABAKLI CİĞER' },
      { id: '19320-1', code: '19320', name: 'TABAKLI TAŞLIK' },
      { id: '31343-1', code: '31343', name: 'TABAKLI YÜREK' },
      { id: '2812318-1', code: '2812318', name: 'AL-TAV UÇLU KANAT' },
      { id: '2812302-1', code: '2812302', name: 'AL-TAV BONFİLE' },
      { id: '2812313-1', code: '2812313', name: 'AL-TAV KEMİKSİZ BUT' },
      { id: '2812305-1', code: '2812305', name: 'AL-TAV ÇORBALIK' },
      { id: '2812310-1', code: '2812310', name: 'AL-TAV KALÇALI BUT' },
      { id: '2812303-1', code: '2812303', name: 'AL-TAV BUT İNCİK' },
      { id: '2812306-1', code: '2812306', name: 'AL-TAV DÖNERLİK BONFİLE' },
      { id: '19027-1', code: '19027', name: 'ŞENPİLİÇ ÇATAL BUT' },
    ];

    const HIGH_LIMIT_EXCLUDED_CODES = ['19179', '19173'];
    const PLASIYERS = ['Metin İlhan', 'Çetin Orhan Manavgat', 'Orhan Sezen', 'Merkez', 'Gazipaşa'];

    const loginScreen = document.getElementById('loginScreen');
    const appScreen = document.getElementById('appScreen');
    const repLoginSelect = document.getElementById('repLoginSelect');
    const enterSystemBtn = document.getElementById('enterSystemBtn');
    const activeRepBadge = document.getElementById('activeRepBadge');
    const changeRepBtn = document.getElementById('changeRepBtn');
    const dateInput = document.getElementById('dateInput');
    const productsWrap = document.getElementById('products');
    const submitBtn = document.getElementById('submitBtn');
    const myOrdersBtn = document.getElementById('myOrdersBtn');
    const editModeBtn = document.getElementById('editModeBtn');
    const cancelModeBtn = document.getElementById('cancelModeBtn');
    const messageBox = document.getElementById('messageBox');
    const myOrdersSection = document.getElementById('myOrdersSection');
    const ordersList = document.getElementById('ordersList');

    let orders = JSON.parse(localStorage.getItem('siparis_orders') || '[]');
    let activeRep = localStorage.getItem('siparis_active_rep') || '';
    let showOrders = false;
    let currentMode = 'view';
    let editingOrderId = null;

    function todayDefault() {
      const now = new Date();
      const y = now.getFullYear();
      const m = String(now.getMonth() + 1).padStart(2, '0');
      const d = String(now.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    function showMessage(text, type = 'normal') {
      messageBox.classList.remove('hidden', 'warning');
      if (type === 'warning') messageBox.classList.add('warning');
      messageBox.textContent = text;
    }

    function clearMessage() {
      messageBox.classList.add('hidden');
      messageBox.classList.remove('warning');
      messageBox.textContent = '';
    }

    function renderPlasiyers() {
      repLoginSelect.innerHTML = PLASIYERS.map(name => `<option value="${name}">${name}</option>`).join('');
      if (activeRep && PLASIYERS.includes(activeRep)) {
        repLoginSelect.value = activeRep;
      }
    }

    function renderProducts() {
      productsWrap.innerHTML = PRODUCTS.map(product => `
        <div class="product-row">
          <div>
            <div class="product-name">${product.name}</div>
            <div class="product-code">Kod: ${product.code}</div>
          </div>
          <input type="number" min="0" inputmode="numeric" data-id="${product.id}" />
        </div>
      `).join('');
    }

    function getInputs() {
      return productsWrap.querySelectorAll('input[data-id]');
    }

    function collectOrder() {
      const inputs = getInputs();
      const cleanItems = {};
      let total = 0;

      inputs.forEach(input => {
        const val = Number(input.value || 0);
        if (val > 0) {
          cleanItems[input.dataset.id] = val;
          total += val;
        }
      });

      return { cleanItems, total };
    }

    function clearInputs() {
      getInputs().forEach(input => input.value = '');
      editingOrderId = null;
      submitBtn.textContent = 'Gönder';
    }

    function saveOrders() {
      localStorage.setItem('siparis_orders', JSON.stringify(orders));
    }

    function saveActiveRep() {
      localStorage.setItem('siparis_active_rep', activeRep);
    }

    function generateOrderId() {
      return `${Date.now()}-${Math.random().toString(36).slice(2, 8)}`;
    }

    function getProductById(id) {
      return PRODUCTS.find(p => p.id === id);
    }

    function formatOrderItems(items) {
      return Object.entries(items)
        .filter(([, qty]) => Number(qty) > 0)
        .map(([id, qty]) => {
          const product = getProductById(id);
          return `${product ? product.name : id}: ${qty} koli`;
        });
    }

    function getActiveRepOrders() {
      return orders
        .filter(order => order.rep === activeRep)
        .sort((a, b) => new Date(b.date) - new Date(a.date));
    }

    function renderOrdersList() {
      if (!showOrders) {
        myOrdersSection.classList.add('hidden');
        return;
      }

      myOrdersSection.classList.remove('hidden');
      const repOrders = getActiveRepOrders();

      if (!repOrders.length) {
        ordersList.innerHTML = '<div class="order-card">Bu plasiyer için kayıtlı sipariş görünmüyor.</div>';
        return;
      }

      ordersList.innerHTML = repOrders.map(order => {
        const lines = formatOrderItems(order.items);
        const total = Object.values(order.items).reduce((sum, value) => sum + Number(value || 0), 0);
        const editButton = currentMode === 'edit'
          ? `<button class="btn light" onclick="startEditOrder('${order.id}')">Bu siparişi düzenle</button>`
          : '';
        const cancelButton = currentMode === 'cancel'
          ? `<button class="btn danger" onclick="deleteOrder('${order.id}')">Bu siparişi iptal et</button>`
          : '';

        return `
          <div class="order-card">
            <div class="order-head">
              <div>
                <div class="order-title">${order.rep}</div>
                <div class="order-sub">Tarih: ${order.date}</div>
              </div>
              <div class="order-total">${total} koli</div>
            </div>
            <ul class="order-items">
              ${lines.map(line => `<li>${line}</li>`).join('')}
            </ul>
            ${(editButton || cancelButton) ? `<div class="order-actions">${editButton}${cancelButton}</div>` : ''}
          </div>
        `;
      }).join('');
    }

    function checkHighQuantityWarnings(cleanItems) {
      const warnings = Object.entries(cleanItems)
        .map(([id, qty]) => {
          const product = getProductById(id);
          if (!product) return null;
          if (HIGH_LIMIT_EXCLUDED_CODES.includes(product.code)) return null;
          if (Number(qty) > 50) return `${product.name} ürünündeki sipariş ${qty} koli. Bu miktar ortalamanın üzerinde.`;
          return null;
        })
        .filter(Boolean);

      if (!warnings.length) return true;
      return window.confirm(`${warnings.join('\n')}\n\nEmin misin?`);
    }

    function setActiveRepUI() {
      activeRepBadge.textContent = `Giriş yapan plasiyer: ${activeRep}`;
    }

    function switchToApp() {
      if (!activeRep) return;
      saveActiveRep();
      setActiveRepUI();
      loginScreen.classList.remove('active');
      appScreen.classList.add('active');
      renderOrdersList();
    }

    function switchToLogin() {
      appScreen.classList.remove('active');
      loginScreen.classList.add('active');
      clearInputs();
      clearMessage();
      showOrders = false;
      currentMode = 'view';
      myOrdersSection.classList.add('hidden');
    }

    function submitOrder() {
      const date = dateInput.value;
      const { cleanItems, total } = collectOrder();

      if (!Object.keys(cleanItems).length) {
        showMessage('En az bir ürün için koli miktarı girmen gerekiyor.', 'warning');
        return;
      }

      const highQtyConfirmed = checkHighQuantityWarnings(cleanItems);
      if (!highQtyConfirmed) {
        showMessage('Yüksek koli uyarısı nedeniyle gönderim iptal edildi.', 'warning');
        return;
      }

      const confirmed = window.confirm(`Toplam sipariş koli miktarı: ${total} koli. Onaylıyor musun?`);
      if (!confirmed) {
        showMessage('Sipariş gönderimi iptal edildi.', 'warning');
        return;
      }

      if (editingOrderId) {
        orders = orders.map(order => order.id === editingOrderId ? { ...order, rep: activeRep, date, items: cleanItems } : order);
        saveOrders();
        clearInputs();
        renderOrdersList();
        showMessage('Sipariş güncellendi.');
        return;
      }

      orders.push({ id: generateOrderId(), rep: activeRep, date, items: cleanItems });
      saveOrders();
      clearInputs();
      renderOrdersList();
      showMessage('Sipariş kaydedildi.');
    }

    function startEditOrder(orderId) {
      const order = orders.find(item => item.id === orderId && item.rep === activeRep);
      if (!order) return;

      dateInput.value = order.date;
      clearMessage();
      getInputs().forEach(input => {
        input.value = order.items[input.dataset.id] ?? '';
      });
      editingOrderId = order.id;
      submitBtn.textContent = 'Güncellemeyi Kaydet';
      showMessage('Sipariş formu düzenleme için yüklendi. İstediğin ekleme/çıkarma değişikliğini yapıp tekrar kaydet.');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function deleteOrder(orderId) {
      const order = orders.find(item => item.id === orderId && item.rep === activeRep);
      if (!order) return;
      const total = Object.values(order.items).reduce((sum, value) => sum + Number(value || 0), 0);
      const confirmed = window.confirm(`${order.date} tarihli ${total} kolilik siparişi iptal etmek istiyor musun?`);
      if (!confirmed) return;

      orders = orders.filter(item => item.id !== orderId);
      saveOrders();
      if (editingOrderId === orderId) clearInputs();
      renderOrdersList();
      showMessage('Sipariş iptal edildi.');
    }

    function setMode(mode) {
      currentMode = mode;
      editModeBtn.classList.remove('secondary');
      cancelModeBtn.classList.remove('secondary');
      editModeBtn.classList.add('light');
      cancelModeBtn.classList.add('danger');

      if (mode === 'edit') {
        editModeBtn.classList.remove('light');
        editModeBtn.classList.add('secondary');
        showOrders = true;
        showMessage('Düzenlemek istediğin siparişi aşağıdan seç.', 'warning');
      } else if (mode === 'cancel') {
        cancelModeBtn.classList.remove('danger');
        cancelModeBtn.classList.add('secondary');
        showOrders = true;
        showMessage('İptal etmek istediğin siparişi aşağıdan seç.', 'warning');
      } else {
        clearMessage();
      }

      renderOrdersList();
    }

    window.startEditOrder = startEditOrder;
    window.deleteOrder = deleteOrder;

    enterSystemBtn.addEventListener('click', () => {
      activeRep = repLoginSelect.value;
      switchToApp();
    });

    changeRepBtn.addEventListener('click', () => {
      const confirmed = window.confirm('Başka bir plasiyer seçmek istiyor musun?');
      if (!confirmed) return;
      activeRep = '';
      localStorage.removeItem('siparis_active_rep');
      switchToLogin();
    });

    submitBtn.addEventListener('click', submitOrder);

    myOrdersBtn.addEventListener('click', () => {
      showOrders = !showOrders;
      if (showOrders) clearMessage();
      renderOrdersList();
    });

    editModeBtn.addEventListener('click', () => {
      setMode(currentMode === 'edit' ? 'view' : 'edit');
    });

    cancelModeBtn.addEventListener('click', () => {
      setMode(currentMode === 'cancel' ? 'view' : 'cancel');
    });

    dateInput.value = todayDefault();
    renderPlasiyers();
    renderProducts();

    if (activeRep && PLASIYERS.includes(activeRep)) {
      switchToApp();
    }
  </script>
</body>
</html>
